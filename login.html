<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Entrar · Oscar Get me a Car</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="stylesheet" href="/colors_and_type.css">
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--oscar-bg,#FAFAFA);color:var(--oscar-ink,#0F1B2D);
    font-family:var(--font-sans);-webkit-font-smoothing:antialiased;padding:24px;
    background-image:radial-gradient(1100px 520px at 50% -10%, var(--oscar-blue-050,#EEF3F8), transparent 70%)}
  .card{width:100%;max-width:380px;padding:44px 40px;background:var(--oscar-surface,#fff);
    border:1px solid var(--line-1,#E6E9ED);border-radius:var(--radius-xl,20px);box-shadow:var(--shadow-2,0 12px 32px rgba(18,38,66,.10))}
  .mark{width:38px;height:38px;border-radius:var(--radius-md,12px);background:var(--grad-deep,linear-gradient(135deg,#1E3A5F,#2D5A8C));
    display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-display);font-weight:800;font-size:19px;margin:0 0 20px}
  h1{font-family:var(--font-display);font-size:25px;font-weight:800;letter-spacing:-0.02em;margin:0 0 6px;color:var(--oscar-navy,#1E3A5F)}
  .sub{font-size:14px;color:var(--oscar-ink-3,#5A6577);margin:0 0 28px;line-height:1.45}
  label{display:block;font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--oscar-ink-4,#8A93A1);margin-bottom:8px}
  input{width:100%;padding:13px 14px;background:var(--oscar-surface-2,#FAFAFA);border:1px solid var(--line-2,#D3D8DF);
    border-radius:var(--radius-md,12px);color:var(--oscar-ink,#0F1B2D);font-size:15px;font-family:inherit;outline:0;
    transition:border-color var(--dur-2),box-shadow var(--dur-2)}
  input:focus{border-color:var(--oscar-blue,#2D5A8C);box-shadow:0 0 0 3px var(--oscar-blue-100,#DCE6F1)}
  button{width:100%;margin-top:18px;padding:14px;background:var(--oscar-blue,#2D5A8C);color:#fff;
    border:0;border-radius:var(--radius-md,12px);font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;
    transition:background var(--dur-2),transform var(--dur-2) var(--ease-out)}
  button:hover{background:var(--oscar-blue-500,#3E72A8);transform:translateY(-1px)}
  button:disabled{opacity:.6;cursor:default;transform:none}
  .err{color:var(--oscar-danger,#A93B2E);font-size:13px;min-height:1.2em;margin-top:10px}
</style>
</head>
<body>
  <main class="card">
    <div class="mark">O</div>
    <h1>Panel de Oscar</h1>
    <p class="sub">Acceso privado. Ingresa la contrasena para ver el rendimiento.</p>
    <form id="f">
      <label for="pw">Contrasena</label>
      <input id="pw" type="password" required autocomplete="current-password" autofocus>
      <div class="err" id="e"></div>
      <button id="b" type="submit">Entrar</button>
    </form>
  </main>
<script>
const f=document.getElementById('f'),e=document.getElementById('e'),b=document.getElementById('b');
f.addEventListener('submit',async ev=>{
  ev.preventDefault(); e.textContent=''; b.disabled=true; b.textContent='Verificando...';
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({password:document.getElementById('pw').value}),credentials:'same-origin'});
    if(r.ok){ location = new URLSearchParams(location.search).get('next') || '/dashboard.html'; }
    else { e.textContent = r.status===429?'Demasiados intentos. Espera un minuto.':'Contrasena incorrecta.';
           b.disabled=false; b.textContent='Entrar'; }
  }catch{ e.textContent='Error de red.'; b.disabled=false; b.textContent='Entrar'; }
});
</script>
</body>
</html>
